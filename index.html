<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Jasmine ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #ff99ac, #ffc2d1);
  overflow: hidden;
  text-align: center;
  color: white;
}

/* Glass card */
.card {
  margin: 40px auto;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* Title */
h1 {
  font-size: 36px;
  text-shadow: 0 0 10px white;
}

/* Images */
.container {
  margin: 15px 0;
}

img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin: 10px;
  object-fit: cover;
  border: 3px solid white;
  box-shadow: 0 0 15px rgba(255,255,255,0.7);
}

/* Typewriter */
#typewriter {
  font-size: 16px;
  line-height: 1.6;
  min-height: 120px;
}

/* Button */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 0 10px white;
}

/* Hearts */
.heart {
  position: fixed;
  width: 15px;
  height: 15px;
  background: #ff1e56;
  transform: rotate(45deg);
  animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff1e56;
  border-radius: 50%;
}

.heart::before { top: -7px; }
.heart::after { left: -7px; }

@keyframes float {
  0% { bottom: -10px; opacity: 1; }
  100% { bottom: 100%; opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
  <h1>Jasmine ❤️</h1>

  <div class="container">
    <!-- Aesthetic placeholder images -->
    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9" alt="Jasmine">
    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e" alt="Rem">
  </div>

  <p id="typewriter"></p>

  <button onclick="loveMessage()">Tap Me 💖</button>
</div>

<audio autoplay loop>
  <source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>

<script>
const text = `Jasmine...

I don’t even know how to explain this perfectly, but I’ll try.

You’re honestly one of the most special people in my life.

Everything about you just feels different.

Your smile, your energy, your presence... it stays with me.

You make things better without even trying.

And I just want you to know that you truly mean a lot to me.

No matter what happens, I’ll always appreciate you ❤️

— Rem`;

let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typewriter").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}
typeWriter();

function loveMessage() {
  alert("Jasmine ❤️ you’re really special to me.");
}

// Floating hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 250);
</script>

</body>
</html>
